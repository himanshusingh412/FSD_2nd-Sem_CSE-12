<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Content Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 id="heading">Welcome to My Page</h1>

    <input type="text" id="userText" placeholder="Enter your message">

    <br><br>

    <button id="changeTextBtn">Change Heading</button>
    <button id="bgColorBtn">Change Background</button>
    <button id="fontSizeBtn">Increase Font Size</button>
    <button id="toggleBtn">Show/Hide Paragraph</button>
    <button id="resetBtn">Reset</button>

    <p id="para">This is a sample paragraph.</p>
</div>

<script src="script.js"></script>
</body>
</html>
