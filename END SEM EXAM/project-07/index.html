<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Simple Interest Calculator</h1>
    <p>Enter Principal, Rate, and Time to calculate Simple Interest and total amount.</p>
    
    <input type="number" id="principal" placeholder="Enter Principal amount" min="1" step="any">
    <input type="number" id="rate" placeholder="Enter Annual Rate (%)" min="0.1" step="any">
    <input type="number" id="time" placeholder="Enter Time in years" min="0.1" step="any">
    
    <button onclick="calculateInterest()">Calculate</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
