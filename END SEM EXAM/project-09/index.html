<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Pattern Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Number Pattern Generator</h1>
    <p>Enter number of rows to print a pattern using nested loops.</p>
    
    <input type="number" id="rows" placeholder="Enter number of rows (e.g. 5)" min="1" max="15" step="1">
    <button onclick="generatePattern()">Generate</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
