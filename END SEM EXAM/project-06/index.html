<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Largest Number Finder</h1>
    <p>Enter 5 numbers to find the largest among them using conditional logic.</p>
    
    <input type="number" id="num1" placeholder="Enter Number 1" step="any">
    <input type="number" id="num2" placeholder="Enter Number 2" step="any">
    <input type="number" id="num3" placeholder="Enter Number 3" step="any">
    <input type="number" id="num4" placeholder="Enter Number 4" step="any">
    <input type="number" id="num5" placeholder="Enter Number 5" step="any">
    
    <button onclick="findLargest()">Find Largest</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
