<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even and Odd Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Even and Odd Checker</h1>
    <p>Enter an integer to check whether it is even or odd.</p>
    
    <input type="number" id="number" placeholder="Enter an integer" step="1">
    <button onclick="checkEvenOdd()">Check</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
