<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel or Consonant Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Vowel or Consonant Checker</h1>
    <p>Enter an alphabet letter to check if it is a vowel or a consonant.</p>
    
    <input type="text" id="character" placeholder="Enter a letter (e.g. A)" maxlength="1">
    <button onclick="checkCharacter()">Check</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
